name: Cypress CI + Reports on Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cypress-tests:
    name: Run Cypress tests and build reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        id: run_tests
        continue-on-error: true
        run: npm test

      - name: Prepare Pages content
        if: always()
        run: |
          mkdir -p public

          if [ -d cypress/reports ]; then
            cp -R cypress/reports/. public/
          fi

          if [ -f public/summary.html ]; then
            cp public/summary.html public/index.html
          elif [ -f public/mochawesome/mochawesome.html ]; then
            cp public/mochawesome/mochawesome.html public/index.html
          else
            cat > public/index.html << 'HTML'
            <!doctype html>
            <html lang="en">
              <head>
                <meta charset="utf-8" />
                <meta name="viewport" content="width=device-width, initial-scale=1" />
                <title>QA Reports</title>
              </head>
              <body>
                <h1>QA reports were not generated in this run.</h1>
              </body>
            </html>
            HTML
          fi

          touch public/.nojekyll

      - name: Configure GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Debug published content
        if: always()
        run: |
          echo "Files in public/:"
          find public -maxdepth 3 -type f | sort

      - name: Upload raw reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-reports
          path: cypress/reports
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Fail workflow if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1

  deploy-pages:
    name: Deploy reports to GitHub Pages
    runs-on: ubuntu-latest
    needs: cypress-tests
    if: ${{ always() && needs.cypress-tests.result != 'cancelled' }}

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
